{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block page_title %}Server Error{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 60vh;">
    <div class="text-center">
        <div class="mb-4">
            <i class="bi bi-bug" style="font-size: 4rem; color: var(--error-color);"></i>
        </div>
        <h1 class="display-4 fw-bold text-white mb-2">500</h1>
        <p class="text-muted fs-5 mb-4">Something went wrong on our end. Please try again later.</p>
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">
            <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}

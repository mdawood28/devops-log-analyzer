{% extends "base.html" %}
{% block title %}404 - Page Not Found{% endblock %}
{% block page_title %}Not Found{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 60vh;">
    <div class="text-center">
        <div class="mb-4">
            <i class="bi bi-exclamation-triangle" style="font-size: 4rem; color: var(--warning-color);"></i>
        </div>
        <h1 class="display-4 fw-bold text-white mb-2">404</h1>
        <p class="text-muted fs-5 mb-4">The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">
            <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}

name: DevOps Log Analyzer Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  # =========================
  # TEST JOB
  # =========================
  test:
    name: 🧪 Test Application
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Lint with Flake8
        run: |
          flake8 app tests --max-line-length=120

      - name: 🎨 Check Code Formatting
        run: |
          black --check app tests

      - name: 🧪 Run Unit Tests
        run: |
          pytest -v --tb=short

  # =========================
  # BUILD JOB
  # =========================
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Verify Project Structure
        run: |
          echo "Checking project structure..."

          test -f run.py
          test -f requirements.txt
          test -d app
          test -d tests

          echo "Project structure verified."

      - name: 🔧 Verify Gunicorn Installation
        run: |
          gunicorn --version

      - name: 🧾 Validate Python Syntax
        run: |
          python -m compileall app

      - name: 📋 Build Summary
        run: |
          echo "=============================="
          echo "Build Successful"
          echo "=============================="
          echo "Python Version:"
          python --version

          echo ""
          echo "Installed Packages:"
          pip list

          echo ""
          echo "Repository:"
          ls -la

  # =========================
  # DEPLOY JOB
  # =========================
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest

    needs:
      - test
      - build

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$EC2_SSH_KEY" > private_key.pem
          chmod 600 private_key.pem

      - name: 🚀 Deploy Application
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i private_key.pem \
          ${USER}@${HOST} << 'EOF'

          cd /home/ubuntu/devops-log-analyzer

          echo "Pulling latest source code..."
          git fetch origin
          git reset --hard origin/main

          echo "Activating virtual environment..."
          source venv/bin/activate

          echo "Installing dependencies..."
          pip install -r requirements.txt

          echo "Restarting application..."
          sudo systemctl restart devops-log-analyzer

          echo "Checking service status..."
          sudo systemctl status devops-log-analyzer --no-pager

          EOF

      - name: 🌐 Verify Deployment
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          curl http://${HOST}

      - name: 🎉 Deployment Complete
        run: |
          rm -f private_key.pem

          echo "===================================="
          echo " DevOps Log Analyzer Deployed"
          echo "===================================="